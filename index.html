<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Beauty — Estética Premium · Jamundí</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --cream:#F5EFE6;
  --cream-2:#EFE7D9;
  --cream-3:#E8DECB;
  --ink:#29251F;
  --ink-2:#4A4339;
  --muted:#8C8273;
  --line:#E3D8C4;
  --gold:#C29A4D;
  --gold-deep:#9B7733;
  --gold-soft:#E6D3A4;
  --white:#FFFDF9;
  --serif:'Cormorant Garamond', Georgia, serif;
  --sans:'Jost', system-ui, -apple-system, sans-serif;
  --blur:5px;
  --overlay:0.42;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:var(--cream);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
img{display:block;max-width:100%;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::selection{background:var(--gold-soft);color:var(--ink);}

.kicker{
  font-family:var(--sans);
  font-weight:500;
  font-size:.72rem;
  letter-spacing:.34em;
  text-transform:uppercase;
  color:var(--gold-deep);
}
.serif{font-family:var(--serif);font-weight:400;line-height:1.02;letter-spacing:.005em;}

/* ============ APP / ROUTING ============ */
#app{min-height:100vh;}
.view{animation:viewIn .7s cubic-bezier(.2,.7,.2,1) both;}
@keyframes viewIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* ============ HOME — 50/50 SPLIT ============ */
.home{position:fixed;inset:0;display:flex;overflow:hidden;background:#15110d;}
@media (max-width:720px){ .home{flex-direction:column;} }

.split{
  position:relative;flex:1 1 0%;height:100%;
  overflow:hidden;border:0;display:block;
  isolation:isolate;
}
.split-bg{
  position:absolute;inset:-4%;
  background-size:cover;background-position:center;
  filter:blur(var(--blur)) brightness(.82) saturate(.92);
  transform:scale(1.06);
  transition:transform 1.1s cubic-bezier(.2,.7,.2,1), filter .6s ease;
  will-change:transform;
}
.split-bg.lashes{background-image:url('assets/hero-lashes.jpg');background-position:center 38%;}
.split-bg.nails{background-image:url('assets/hero-nails.jpg');background-position:center 45%;}
.split-bg.cabello{background-image:url('assets/hero-cabello.jpg');background-position:center 40%;}
/* gold dividers between panels */
.split:not(:first-child)::after{content:"";position:absolute;z-index:6;left:0;top:0;bottom:0;width:1px;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(230,211,164,.45) 30%,rgba(230,211,164,.45) 70%,transparent);}
@media(max-width:720px){
  .split:not(:first-child)::after{left:0;right:0;top:0;bottom:auto;width:auto;height:1px;
    background:linear-gradient(90deg,transparent,rgba(230,211,164,.45) 30%,rgba(230,211,164,.45) 70%,transparent);}
}
.split-overlay{
  position:absolute;inset:0;z-index:1;
  background:
    radial-gradient(120% 90% at 50% 40%, rgba(20,15,10,0) 35%, rgba(20,15,10,.55) 100%),
    linear-gradient(180deg, rgba(20,15,10,.35), rgba(20,15,10,.55));
  opacity:var(--overlay);
  transition:opacity .5s ease;
}
.split:hover .split-bg, .split:focus-visible .split-bg{transform:scale(1.13);}
.split:hover .split-overlay, .split:focus-visible .split-overlay{opacity:calc(var(--overlay) + 0.22);}
.split:focus-visible{outline:2px solid var(--gold-soft);outline-offset:-6px;}

.split-content{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;color:var(--white);padding:6vh 8% 0;
  pointer-events:none;
}
.split .split-content{justify-content:center;padding-bottom:12vh;}
@media(min-width:721px){
  .split .split-content{justify-content:flex-end;padding:0 8% 13vh;}
}
.split-title{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(3.2rem,7vw,6.2rem);line-height:.95;
  letter-spacing:.01em;
  text-shadow:0 6px 40px rgba(0,0,0,.45);
}
.split-sub{
  margin-top:1.1rem;font-weight:300;
  font-size:clamp(.82rem,1.3vw,1rem);letter-spacing:.26em;text-transform:uppercase;
  color:rgba(255,253,249,.92);
}
.split-cta{
  margin-top:2.2rem;display:inline-flex;align-items:center;gap:.7rem;
  font-size:.74rem;letter-spacing:.24em;text-transform:uppercase;font-weight:500;
  color:var(--gold-soft);
  opacity:.85;transition:opacity .4s, gap .4s;
}
.split:hover .split-cta{opacity:1;gap:1.1rem;}
.split-cta .ln{display:inline-block;width:34px;height:1px;background:var(--gold-soft);}

/* center logo */
.home-logo{
  position:absolute;z-index:5;left:50%;top:5.2vh;
  transform:translateX(-50%);
  width:clamp(140px,14vw,210px);
  pointer-events:none;
  filter:drop-shadow(0 10px 40px rgba(0,0,0,.5));
  animation:logoIn 1.2s cubic-bezier(.2,.7,.2,1) both;
}
@keyframes logoIn{from{opacity:0;transform:translateX(-50%) scale(.92);}to{opacity:1;transform:translateX(-50%) scale(1);}}
@media(max-width:720px){
  .home{flex-direction:column;align-items:stretch;}
  .home .home-logo{position:static;align-self:center;order:-2;top:auto;transform:none;
    margin:2.6vh 0 .6vh;width:clamp(96px,24vw,124px);animation-name:logoFade;}
  .split .split-content{padding-bottom:0;justify-content:center;}
  .home .home-tag{position:static;order:-1;align-self:center;left:auto;bottom:auto;transform:none;
    margin:0 0 2.2vh;white-space:normal;text-align:center;}
}
@keyframes logoFade{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
.home-tag{
  position:absolute;z-index:5;left:50%;bottom:5.2vh;transform:translateX(-50%);
  pointer-events:none;color:rgba(255,253,249,.7);
  font-size:.66rem;letter-spacing:.4em;text-transform:uppercase;font-weight:300;
  white-space:nowrap;
}
.home-seam{display:none;
  position:absolute;z-index:4;left:50%;top:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent,rgba(230,211,164,.5) 30%,rgba(230,211,164,.5) 70%,transparent);
  transform:translateX(-50%);pointer-events:none;
}
@media(max-width:720px){
  .home-seam{left:0;right:0;top:50%;bottom:auto;width:auto;height:1px;
    background:linear-gradient(90deg,transparent,rgba(230,211,164,.5) 30%,rgba(230,211,164,.5) 70%,transparent);}
}

/* ============ LANDING SHARED ============ */
.landing{min-height:100vh;background:var(--cream);}
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;padding:0 clamp(1.1rem,4vw,2.6rem);height:66px;
  background:rgba(245,239,230,.82);
  backdrop-filter:blur(14px) saturate(1.2);
  border-bottom:1px solid var(--line);
}
.back-btn{
  display:inline-flex;align-items:center;gap:.6rem;
  font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;font-weight:500;color:var(--ink-2);
  transition:color .3s, gap .3s;
}
.back-btn:hover{color:var(--gold-deep);gap:.9rem;}
.back-btn .ar{font-size:1rem;line-height:1;}
.topbar-logo{height:34px;width:auto;}
.wa-mini{
  display:inline-flex;align-items:center;gap:.55rem;
  padding:.6rem 1.1rem;border:1px solid var(--gold);border-radius:999px;
  font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;font-weight:500;color:var(--gold-deep);
  transition:background .3s,color .3s,transform .3s;
}
.wa-mini:hover{background:var(--gold);color:var(--white);}
.wa-mini svg{width:14px;height:14px;}
@media(max-width:560px){ .wa-mini span{display:none;} .wa-mini{padding:.6rem;} }

/* hero */
.l-hero{
  position:relative;
  display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(2rem,5vw,5rem);
  align-items:center;
  padding:clamp(3.5rem,8vw,7rem) clamp(1.4rem,6vw,5rem) clamp(2.5rem,5vw,4rem);
  max-width:1320px;margin:0 auto;
}
@media(max-width:880px){ .l-hero{grid-template-columns:1fr;gap:2.4rem;} }
.l-hero-kicker{margin-bottom:1.5rem;}
.l-hero h1{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(4rem,11vw,9rem);line-height:.9;letter-spacing:.01em;color:var(--ink);
}
.l-hero h1 em{font-style:italic;color:var(--gold-deep);}
.l-hero-sub{
  margin-top:1.4rem;font-family:var(--serif);font-style:italic;font-weight:400;
  font-size:clamp(1.3rem,2.6vw,1.9rem);color:var(--ink-2);line-height:1.25;
}
.l-hero-intro{
  margin-top:1.6rem;max-width:46ch;font-weight:300;font-size:1.02rem;line-height:1.7;color:var(--ink-2);
  text-wrap:pretty;
}
.unisex-badge{
  margin-top:1.8rem;display:inline-flex;align-items:center;gap:.7rem;
  padding:.5rem .95rem;border:1px solid var(--line);border-radius:999px;background:var(--white);
  font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;font-weight:500;color:var(--muted);
}
.unisex-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}

.l-hero-media{position:relative;}
.l-hero-img{
  width:100%;aspect-ratio:4/5;object-fit:cover;border-radius:2px;
  box-shadow:0 30px 70px -30px rgba(41,37,31,.5);
  filter:saturate(.96);
}
.l-hero-media::after{
  content:"";position:absolute;inset:0;border:1px solid rgba(255,253,249,.3);
  margin:14px;pointer-events:none;
}
.l-hero-frame{
  position:absolute;top:-14px;left:-14px;right:18px;bottom:18px;
  border:1px solid var(--gold);border-radius:2px;z-index:-1;
}

/* services */
.services{max-width:1320px;margin:0 auto;padding:clamp(2rem,5vw,4rem) clamp(1.4rem,6vw,5rem) clamp(4rem,9vw,8rem);}
.svc-group{margin-top:clamp(3rem,6vw,5rem);}
.svc-group:first-child{margin-top:0;}
.svc-head{
  display:flex;align-items:baseline;justify-content:space-between;gap:1.5rem;
  padding-bottom:1.3rem;margin-bottom:.4rem;border-bottom:1px solid var(--line);
}
.svc-head h2{font-family:var(--serif);font-weight:400;font-size:clamp(1.9rem,4vw,2.9rem);color:var(--ink);}
.svc-head .gnote{font-size:.74rem;color:var(--muted);font-weight:300;letter-spacing:.04em;text-align:right;}

.svc-row{
  display:grid;grid-template-columns:1fr auto;gap:1.5rem 2rem;align-items:center;
  padding:1.5rem .4rem;border-bottom:1px solid var(--line);
  transition:background .35s, padding-left .35s;
}
.svc-row:hover{background:linear-gradient(90deg, rgba(230,211,164,.16), transparent 80%);padding-left:1.1rem;}
.svc-name{font-family:var(--serif);font-weight:500;font-size:1.55rem;color:var(--ink);line-height:1.1;}
.svc-desc{margin-top:.35rem;font-weight:300;font-size:.92rem;color:var(--muted);line-height:1.5;max-width:48ch;}
.price-set{display:flex;gap:1.8rem;justify-content:flex-end;flex-wrap:wrap;}
.price-cell{text-align:right;min-width:74px;}
.price-cell .pl{display:block;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;}
.price-cell .pv{font-family:var(--serif);font-weight:500;font-size:1.5rem;color:var(--gold-deep);white-space:nowrap;}
.price-cell .pv small{font-size:.62em;color:var(--muted);font-family:var(--sans);font-weight:400;}
@media(max-width:620px){
  .svc-row{grid-template-columns:1fr;gap:1rem;}
  .price-set{justify-content:flex-start;gap:1.4rem;}
  .price-cell{text-align:left;}
}

/* nails switch */
.switch-wrap{display:flex;justify-content:center;padding:clamp(1rem,3vw,2rem) 1rem 0;}
.switch{
  position:relative;display:inline-flex;padding:5px;border-radius:999px;
  background:var(--cream-3);border:1px solid var(--line);
}
.switch-thumb{
  position:absolute;top:5px;bottom:5px;left:5px;width:calc(50% - 5px);
  border-radius:999px;background:var(--white);
  box-shadow:0 6px 18px -8px rgba(41,37,31,.4);
  transition:transform .42s cubic-bezier(.3,.8,.3,1);
}
.switch.caballero .switch-thumb{transform:translateX(100%);}
.switch button{
  position:relative;z-index:1;padding:.75rem 2.2rem;border-radius:999px;
  font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;font-weight:500;
  color:var(--muted);transition:color .35s;min-width:140px;
}
.switch button.active{color:var(--ink);}
.switch button.active .sg{color:var(--gold-deep);}
@media(max-width:480px){ .switch button{padding:.7rem 1.3rem;min-width:120px;} }

.nail-list{animation:fadeSwap .45s ease both;}
@keyframes fadeSwap{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* CTA */
.cta{
  position:relative;text-align:center;overflow:hidden;
  padding:clamp(4rem,9vw,8rem) clamp(1.4rem,6vw,5rem);
  background:var(--ink);color:var(--white);
}
.cta-bg{position:absolute;inset:0;background-size:cover;background-position:center;
  filter:blur(3px) brightness(.4) saturate(.9);transform:scale(1.08);opacity:.5;}
.cta-inner{position:relative;z-index:1;max-width:680px;margin:0 auto;}
.cta .kicker{color:var(--gold-soft);}
.cta h2{font-family:var(--serif);font-weight:300;font-size:clamp(2.6rem,6vw,4.6rem);line-height:1;margin:1.2rem 0 1rem;}
.cta p{font-weight:300;color:rgba(255,253,249,.78);font-size:1.05rem;line-height:1.6;max-width:42ch;margin:0 auto 2.4rem;}
.wa-btn{
  display:inline-flex;align-items:center;gap:.85rem;
  padding:1.05rem 2.4rem;border-radius:999px;
  background:var(--gold);color:#1c1710;
  font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;
  transition:transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s, background .35s;
  box-shadow:0 14px 34px -12px rgba(194,154,77,.7);
}
.wa-btn:hover{transform:translateY(-3px);box-shadow:0 22px 44px -14px rgba(194,154,77,.85);background:var(--gold-soft);}
.wa-btn svg{width:20px;height:20px;}
.cta-meta{margin-top:2.6rem;display:flex;gap:2.4rem;justify-content:center;flex-wrap:wrap;
  font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,253,249,.6);}
.cta-meta a:hover{color:var(--gold-soft);}
.cta-meta .sep{color:var(--gold);}

/* footer mini */
.l-foot{padding:2.4rem;text-align:center;background:var(--cream);border-top:1px solid var(--line);}
.l-foot img{height:42px;margin:0 auto 1rem;opacity:.85;}
.l-foot p{font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);}

/* intro note about prices */
.price-note{max-width:1320px;margin:0 auto;padding:0 clamp(1.4rem,6vw,5rem);}
.price-note span{
  display:inline-block;margin-top:.4rem;font-size:.72rem;color:var(--muted);
  font-weight:300;letter-spacing:.04em;
}

/* reduced motion */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
}
</style>
</head>

/* ===================== ROOT APP + ROUTING ===================== */
function App(){
  const [view, setView] = useState(() => {
    const h = (window.location.hash || '').replace('#','');
    return ['lashes','nails','cabello'].includes(h) ? h : 'home';
  });

  const go = (v) => {
    setView(v);
    window.location.hash = v === 'home' ? '' : v;
    window.scrollTo({ top: 0, behavior: 'auto' });
  };

  React.useEffect(() => {
    const onPop = () => {
      const h = (window.location.hash || '').replace('#','');
      setView(['lashes','nails','cabello'].includes(h) ? h : 'home');
    };
    window.addEventListener('hashchange', onPop);
    return () => window.removeEventListener('hashchange', onPop);
  }, []);

  React.useEffect(() => {
    document.body.style.overflow = view === 'home' ? 'hidden' : 'auto';
  }, [view]);

  let screen;
  if (view === 'lashes') screen = <Lashes go={go} key="lashes" />;
  else if (view === 'nails') screen = <Nails go={go} key="nails" />;
  else if (view === 'cabello') screen = <Cabello go={go} key="cabello" />;
  else screen = <Home go={go} key="home" />;

  return screen;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
